<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAKDE</title>
    <style>
      @font-face { font-family: 'Exo 2'; font-style: normal; font-weight: 400; src: url('/fonts/exo2-400.ttf') format('truetype'); }
      @font-face { font-family: 'Exo 2'; font-style: normal; font-weight: 600; src: url('/fonts/exo2-600.ttf') format('truetype'); }
      @font-face { font-family: 'Exo 2'; font-style: normal; font-weight: 700; src: url('/fonts/exo2-700.ttf') format('truetype'); }
      @font-face { font-family: 'Exo 2'; font-style: normal; font-weight: 800; src: url('/fonts/exo2-800.ttf') format('truetype'); }
      body { font-family: 'Exo 2', sans-serif; }
    </style>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("pakde-theme");
          if (theme === "light") {
            document.documentElement.classList.add("light");
          }
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
